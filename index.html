<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login dengan Google - Supabase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px 24px;
            background: white;
            color: #333;
            border: 2px solid #dadce0;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .google-btn:hover {
            background: #f8f9fa;
            border-color: #4285f4;
            box-shadow: 0 2px 8px rgba(66, 133, 244, 0.2);
            transform: translateY(-2px);
        }

        .google-btn:active {
            transform: translateY(0);
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        .user-info {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .user-info.active {
            display: block;
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 3px solid #4285f4;
        }

        .user-name {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .user-email {
            font-size: 14px;
            color: #666;
            margin-bottom: 20px;
        }

        .logout-btn {
            padding: 10px 24px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 10px;
        }

        .logout-btn:hover {
            background: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
        }

        .switch-account-btn {
            padding: 10px 24px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .switch-account-btn:hover {
            background: #3367d6;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(66, 133, 244, 0.3);
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .login-form {
            display: block;
        }

        .login-form.hidden {
            display: none;
        }

        .error-message {
            display: none;
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
        }

        .error-message.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div class="login-form" id="loginForm">
            <h1>Selamat Datang</h1>
            <p class="subtitle">Masuk dengan akun Google Anda</p>
            
            <button class="google-btn" id="googleLoginBtn">
                <svg class="google-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.03 2.53-2.18 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Masuk dengan Google
            </button>

            <div class="error-message" id="errorMessage"></div>
        </div>

        <!-- User Info (shown after login) -->
        <div class="user-info" id="userInfo">
            <img class="user-avatar" id="userAvatar" src="" alt="User Avatar">
            <div class="user-name" id="userName"></div>
            <div class="user-email" id="userEmail"></div>
            <div class="button-group">
                <button class="switch-account-btn" id="switchAccountBtn">Ganti Akun</button>
                <button class="logout-btn" id="logoutBtn">Keluar</button>
            </div>
        </div>
    </div>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // Initialize Supabase
        const supabaseClient = supabase.createClient(
            'https://ziwjmsjvhzivmvqimiei.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inppd2ptc2p2aHppdm12cWltaWVpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MDk1MDAsImV4cCI6MjA5OTI4NTUwMH0.XLx5gKk7haa3ixNxFlJkQ7iL96Vnh9eLty_EhrjnFA0'
        );

        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const userInfo = document.getElementById('userInfo');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const switchAccountBtn = document.getElementById('switchAccountBtn');
        const errorMessage = document.getElementById('errorMessage');
        const userAvatar = document.getElementById('userAvatar');
        const userName = document.getElementById('userName');
        const userEmail = document.getElementById('userEmail');

        // Check if user is already logged in
        supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                showUserInfo(session.user);
            }
        });

        // Google Login
        googleLoginBtn.addEventListener('click', async () => {
            console.log('Tombol login diklik');
            errorMessage.classList.remove('active');
            
            try {
                console.log('Mencoba login dengan Google...');
                const { data, error } = await supabaseClient.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin,
                        prompt: 'select_account'  // Always show account chooser
                    }
                });

                console.log('Response:', { data, error });

                if (error) {
                    console.error('Error login:', error);
                    showError('Error: ' + error.message);
                } else {
                    console.log('Login berhasil, mengarahkan ke Google...');
                }
            } catch (error) {
                console.error('Exception saat login:', error);
                showError('Terjadi kesalahan: ' + error.message);
            }
        });

        // Logout
        logoutBtn.addEventListener('click', async () => {
            try {
                console.log('Melakukan logout...');
                const { error } = await supabaseClient.auth.signOut();
                
                if (error) {
                    console.error('Error logout:', error);
                    showError('Error: ' + error.message);
                } else {
                    console.log('Logout berhasil');
                    showLoginForm();
                }
            } catch (error) {
                console.error('Exception saat logout:', error);
                showError('Terjadi kesalahan saat logout. Silakan coba lagi.');
            }
        });

        // Switch Account (just logout)
        switchAccountBtn.addEventListener('click', async () => {
            try {
                console.log('Ganti akun: logout...');
                
                // Just logout, user can login again with different account
                const { error } = await supabaseClient.auth.signOut();
                
                if (error) {
                    console.error('Error logout:', error);
                    showError('Error: ' + error.message);
                } else {
                    console.log('Logout berhasil, silakan login dengan akun lain');
                    showLoginForm();
                }
                
            } catch (error) {
                console.error('Exception saat ganti akun:', error);
                showError('Terjadi kesalahan. Silakan coba lagi.');
            }
        });

        // Listen for auth state changes
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                showUserInfo(session.user);
            } else if (event === 'SIGNED_OUT') {
                showLoginForm();
            }
        });

        // Show user info
        function showUserInfo(user) {
            loginForm.classList.add('hidden');
            userInfo.classList.add('active');
            
            // Get user metadata
            const metadata = user.user_metadata;
            userName.textContent = metadata.full_name || metadata.name || 'User';
            userEmail.textContent = user.email;
            userAvatar.src = metadata.avatar_url || metadata.picture || 'https://via.placeholder.com/80';
        }

        // Show login form
        function showLoginForm() {
            loginForm.classList.remove('hidden');
            userInfo.classList.remove('active');
            errorMessage.classList.remove('active');
        }

        // Show error message
        function showError(message) {
            console.error('Menampilkan error:', message);
            errorMessage.textContent = message;
            errorMessage.classList.add('active');
        }
    </script>
</body>
</html>
